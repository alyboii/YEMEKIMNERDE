      properties:
        id:
          type: string
          format: uuid
          example: "ord-789"
        kullaniciId:
          type: string
          format: uuid
          example: "usr-123"
        restoranId:
          type: string
          format: uuid
          example: "rst-456"
        urunler:
          type: array
          items:
            $ref: '#/components/schemas/SiparisItem'
        toplamTutar:
          type: number
          format: float
          description: Toplam sipariş tutarı (TL)
          example: 360.00
        durum:
          type: string
          enum: [beklemede, hazirlaniyor, yolda, teslim_edildi, iptal]
          example: "beklemede"
