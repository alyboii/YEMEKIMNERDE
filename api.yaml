            properties:
              alan:
                type: string
                example: "email"
              mesaj:
                type: string
                example: "E-posta formatı geçersiz"

  responses:
    GecersizIstek:
      description: Geçersiz istek
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Hata'
          example:
