          format: uuid
          example: "usr-123"
        restoranId:
          type: string
          format: uuid
          nullable: true
          example: "rst-456"
        urunler:
          type: array
          items:
            $ref: '#/components/schemas/SiparisItem'
        araToplam:
          type: number
          format: float
          example: 360.00

    SepetItemInput:
      type: object
      required:
        - restoranId
