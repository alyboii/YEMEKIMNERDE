          type: string
          maxLength: 500
          example: "Acılı kıyma kebap, pilav ve salata ile"
        fiyat:
          type: number
          format: float
          minimum: 0
          example: 180.00
        kategori:
          type: string
          example: "Ana Yemek"
        resimUrl:
          type: string
          format: uri

