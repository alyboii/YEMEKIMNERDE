          type: string
          format: uuid
          example: "rst-456"
        urunler:
          type: array
          minItems: 1
          items:
            type: object
            required:
              - urunId
              - adet
            properties:
              urunId:
                type: string
                format: uuid
              adet:
                type: integer
                minimum: 1
