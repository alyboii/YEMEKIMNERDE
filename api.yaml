          type: integer
          example: 2
        birimFiyat:
          type: number
          format: float
          example: 180.00
        toplamFiyat:
          type: number
          format: float
          example: 360.00

    SiparisListesi:
      type: object
      properties:
        veri:
          type: array
          items:
            $ref: '#/components/schemas/Siparis'
        sayfalama:
          $ref: '#/components/schemas/Sayfalama'

