<!DOCTYPE html>
<html class="dark" lang="tr">
<head>
<meta charset="utf-8"/>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script id="tailwind-config">

          "primary": "#ff9153",

<style>
  body { font-family: 'Inter', sans-serif; background-color: #0a0a0a; color: #ffffff; }
  .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
  .glass-card { background: rgba(38, 38, 38, 0.4); backdrop-filter: blur(20px); }
  .glow-hover:hover { box-shadow: 0 0 30px rgba(255, 145, 83, 0.2); }
  .restaurant-card { transition: transform 0.2s, box-shadow 0.2s; }
  .restaurant-card:hover { transform: translateY(-4px); box-shadow: 0 20px 40px rgba(0,0,0,0.4); }
  .badge { display: inline-block; padding: 2px 10px; border-radius: 9999px; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; }
</style>
</head>
<body class="selection:bg-primary/30">

<!-- TopNavBar -->
<nav class="fixed top-0 left-0 right-0 z-50 flex items-center justify-between px-8 py-4 bg-neutral-900/60 backdrop-blur-xl rounded-full mt-4 mx-auto w-[95%] max-w-7xl shadow-[0_20px_50px_rgba(0,0,0,0.3)] font-['Inter'] tracking-tight">
  <a href="index.html" class="text-2xl font-bold tracking-tighter text-white">🍔 YEMEKİMNEREDE</a>
  <div class="hidden md:flex items-center gap-8">
    <a class="text-neutral-400 hover:text-white transition-colors duration-300" href="index.html">Ana Sayfa</a>
    <a class="text-orange-500 font-semibold hover:text-orange-400 transition-colors duration-300" href="restaurants.html">Restoranlar</a>
    <a class="text-neutral-400 hover:text-white transition-colors duration-300" href="kampanyalar.html">Kampanyalar</a>
    <a class="text-neutral-400 hover:text-white transition-colors duration-300" href="kurye-ol.html">Kurye Ol</a>
  </div>
  <div class="flex items-center gap-4" id="navAuthArea">
    <button class="text-white font-medium hover:text-orange-500 transition-colors duration-300" onclick="window.location.href='login.html'">Giriş Yap</button>
    <button class="bg-primary-container text-on-primary-fixed px-6 py-2.5 rounded-full font-bold hover:shadow-[0_0_20px_rgba(255,122,35,0.4)] transition-all" onclick="window.location.href='register.html'">Kayıt Ol</button>
  </div>
  <script>
  (function() {
    const token = localStorage.getItem('token');
    if (token) {
      const area = document.getElementById('navAuthArea');
      area.innerHTML = `
        <button onclick="window.location.href='profile.html'" class="text-white font-medium hover:text-orange-500 transition-colors">Profilim</button>
        <button onclick="localStorage.clear(); window.location.reload();" class="bg-primary-container text-on-primary-fixed px-6 py-2.5 rounded-full font-bold">Çıkış</button>
      `;
    }
  })();
  </script>
</nav>

<main class="pt-32 pb-20 min-h-screen bg-surface">
  <div class="container mx-auto px-8 max-w-7xl">

    <!-- Page Header -->
    <div class="mb-12">
      <span class="inline-block px-4 py-1.5 mb-4 text-xs font-bold tracking-widest text-primary bg-primary/10 rounded-full uppercase">Tüm Restoranlar</span>
      <h1 class="text-5xl font-black tracking-tight mb-3">Restoranları Keşfet</h1>
      <p class="text-on-surface-variant text-lg">Şehrin en iyi restoranlarından seç, anında sipariş ver.</p>
    </div>

    <!-- Filter Bar -->
    <div class="flex flex-wrap gap-3 mb-10" id="filter-bar">
      <button data-filter="all" onclick="filterRestaurants('all')" class="filter-btn px-5 py-2 rounded-full border border-primary bg-primary/10 text-primary font-semibold text-sm transition-all">Tümü</button>
      <button data-filter="Burger" onclick="filterRestaurants('Burger')" class="filter-btn px-5 py-2 rounded-full border border-white/10 text-neutral-400 font-semibold text-sm hover:border-primary hover:text-primary transition-all">🍔 Burger</button>
      <button data-filter="Sushi" onclick="filterRestaurants('Sushi')" class="filter-btn px-5 py-2 rounded-full border border-white/10 text-neutral-400 font-semibold text-sm hover:border-primary hover:text-primary transition-all">🍱 Sushi</button>
      <button data-filter="Pizza" onclick="filterRestaurants('Pizza')" class="filter-btn px-5 py-2 rounded-full border border-white/10 text-neutral-400 font-semibold text-sm hover:border-primary hover:text-primary transition-all">🍕 Pizza</button>
      <button data-filter="Kebap" onclick="filterRestaurants('Kebap')" class="filter-btn px-5 py-2 rounded-full border border-white/10 text-neutral-400 font-semibold text-sm hover:border-primary hover:text-primary transition-all">🥙 Kebap</button>
      <button data-filter="Asya" onclick="filterRestaurants('Asya')" class="filter-btn px-5 py-2 rounded-full border border-white/10 text-neutral-400 font-semibold text-sm hover:border-primary hover:text-primary transition-all">🥢 Asya</button>
      <button data-filter="Meksika" onclick="filterRestaurants('Meksika')" class="filter-btn px-5 py-2 rounded-full border border-white/10 text-neutral-400 font-semibold text-sm hover:border-primary hover:text-primary transition-all">🌮 Meksika</button>
      <button data-filter="Akdeniz" onclick="filterRestaurants('Akdeniz')" class="filter-btn px-5 py-2 rounded-full border border-white/10 text-neutral-400 font-semibold text-sm hover:border-primary hover:text-primary transition-all">🫒 Akdeniz</button>
    </div>

    <!-- Restaurant Grid -->
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-3 gap-8" id="restaurant-grid">
      <!-- Kartlar JS ile doldurulacak -->
    </div>
  </div>
</main>

<!-- Footer -->
<footer class="w-full py-12 px-8 flex flex-col items-center gap-8 bg-[#0a0a0a] border-t border-white/5 text-sm">
  <div class="w-full max-w-7xl flex flex-col md:flex-row items-center justify-between gap-8">
    <div class="text-xl font-black text-white uppercase">YEMEKİMNEREDE</div>
    <div class="flex flex-wrap justify-center gap-8 text-neutral-500">
      <a class="hover:text-white transition-all" href="#">Hakkımızda</a>
      <a class="hover:text-white transition-all" href="restaurants.html">Restoranlar</a>
      <a class="hover:text-white transition-all" href="kurye-ol.html">Kurye Ol</a>
      <a class="hover:text-white transition-all" href="#">Yardım</a>
    </div>
  </div>
  <div class="w-full border-t border-white/5 pt-8 text-neutral-600 text-center">© 2024 YEMEKİMNEREDE. Tüm hakları saklıdır.</div>
</footer>

<script>
  const UNS = "https://images.unsplash.com/";
  const QC  = "?auto=format&fit=crop&w=600&q=80";

  const restaurants = [
    {
      id: 1,
      name: "Burger House",
      category: "Burger",
      emoji: "🍔",
      description: "Özenle seçilmiş malzemelerle hazırlanan gurme burgerler. Her lokma bir deneyim.",
      rating: 4.8,
      deliveryTime: "20-30 dk",
      minOrder: 80,
      deliveryFee: 15,
      badge: "Çok Popüler",
      badgeColor: "bg-orange-500/20 text-orange-400",
      tags: ["Burger", "Sandviç", "Fast Food"],
      coverImage: UNS+"photo-1568901346375-23c9450c58cd"+QC
    },
    {
      id: 2,
      name: "Sushi Palace",
      category: "Sushi",
      emoji: "🍱",
      description: "Japonya'nın geleneksel tatlarını İstanbul'a taşıyan otantik sushi deneyimi.",
      rating: 4.9,
      deliveryTime: "30-45 dk",
      minOrder: 150,
      deliveryFee: 20,
      badge: "Premium",
      badgeColor: "bg-purple-500/20 text-purple-400",
      tags: ["Sushi", "Ramen", "Japon"],
      coverImage: UNS+"photo-1579871494447-9811cf80d66c"+QC
    },
    {
      id: 3,
      name: "Pizza Roma",
      category: "Pizza",
      emoji: "🍕",
      description: "Taş fırında pişirilmiş, İtalyan usulü ince hamurlu pizzalar.",
      rating: 4.7,
      deliveryTime: "25-35 dk",
      minOrder: 100,
      deliveryFee: 12,
      badge: "Yeni",
      badgeColor: "bg-green-500/20 text-green-400",
      tags: ["Pizza", "Makarna", "İtalyan"],
      coverImage: UNS+"photo-1574071318508-1cdbab80d002"+QC
    },
    {
      id: 4,
      name: "Kebap Dünyası",
      category: "Kebap",
      emoji: "🥙",
      description: "Antep'ten gelen ustalar eliyle hazırlanan geleneksel Türk kebapları.",
      rating: 4.6,
      deliveryTime: "15-25 dk",
      minOrder: 60,
      deliveryFee: 10,
      badge: "Yerel Lezzet",
      badgeColor: "bg-red-500/20 text-red-400",
      tags: ["Kebap", "Izgara", "Türk"],
      coverImage: UNS+"photo-1599487488170-d11ec9c172f0"+QC
    },
    {
      id: 5,
      name: "Wok Express",
      category: "Asya",
      emoji: "🥢",
      description: "Çin, Tayland ve Vietnam mutfaklarından seçmeler. Asya sokak lezzetleri.",
      rating: 4.5,
      deliveryTime: "20-30 dk",
      minOrder: 90,
      deliveryFee: 15,
      badge: "Vegane Seçenek",
      badgeColor: "bg-emerald-500/20 text-emerald-400",
      tags: ["Asya", "Çin", "Tayland"],
      coverImage: UNS+"photo-1562565652-a0d8f0c59eb4"+QC
    },
    {
      id: 6,
      name: "Taco Loco",
      category: "Meksika",
      emoji: "🌮",
      description: "Meksika sokaklarından ilham alan otantik tacos, burrito ve nacho tarifleri.",
      rating: 4.4,
      deliveryTime: "20-35 dk",
      minOrder: 75,
      deliveryFee: 18,
      badge: "Acılı Seçenek",
      badgeColor: "bg-rose-500/20 text-rose-400",
      tags: ["Meksika", "Taco", "Burrito"],
      coverImage: UNS+"photo-1565299585323-38d6b0865b47"+QC
    },
    {
      id: 7,
      name: "Akdeniz Sofrası",
      category: "Akdeniz",
      emoji: "🫒",
      description: "Ege ve Akdeniz'in en taze malzemeleriyle hazırlanan sağlıklı ve lezzetli tabaklar.",
      rating: 4.7,
      deliveryTime: "25-40 dk",
      minOrder: 110,
      deliveryFee: 14,
      badge: "Sağlıklı",
      badgeColor: "bg-teal-500/20 text-teal-400",
      tags: ["Akdeniz", "Salata", "Deniz Ürünleri"],
      coverImage: UNS+"photo-1544025162-d76694265947"+QC
    }
  ];

  function renderRestaurants(list) {
    const grid = document.getElementById('restaurant-grid');
    grid.innerHTML = list.map(r => `
      <div class="restaurant-card glass-card rounded-xl border border-white/5 overflow-hidden cursor-pointer"
           onclick="window.location.href='restaurant.html?id=${r.id}'">
        <!-- Cover -->
        <div class="h-44 relative overflow-hidden bg-surface-container">
          <img src="${r.coverImage}" alt="${r.name}" class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-105" loading="lazy" />
          <div class="absolute inset-0 bg-gradient-to-t from-black/60 via-transparent to-transparent"></div>
          <div class="absolute top-3 left-3">
            <span class="badge ${r.badgeColor}">${r.badge}</span>
          </div>
          <div class="absolute top-3 right-3 flex items-center gap-1 bg-black/50 backdrop-blur-sm px-2 py-1 rounded-full">
            <span class="text-yellow-400 text-xs">★</span>
            <span class="text-white text-xs font-bold">${r.rating}</span>
          </div>
        </div>
        <!-- Info -->
        <div class="p-6">
          <div class="flex items-start justify-between mb-2">
            <h3 class="text-xl font-bold text-white">${r.emoji} ${r.name}</h3>
          </div>
          <div class="flex flex-wrap gap-2 mb-3">
            ${r.tags.map(t => `<span class="text-xs px-2 py-0.5 rounded-full bg-white/5 text-neutral-400">${t}</span>`).join('')}
          </div>
          <p class="text-on-surface-variant text-sm leading-relaxed mb-4 line-clamp-2">${r.description}</p>
          <div class="flex items-center justify-between text-xs text-neutral-500 border-t border-white/5 pt-4">
            <span class="flex items-center gap-1">
              <span class="material-symbols-outlined text-sm text-primary">schedule</span>
              ${r.deliveryTime}
            </span>
            <span class="flex items-center gap-1">
              <span class="material-symbols-outlined text-sm text-primary">payments</span>
              Min. ${r.minOrder}₺
            </span>
            <span class="flex items-center gap-1">
              <span class="material-symbols-outlined text-sm text-primary">local_shipping</span>
              ${r.deliveryFee}₺
            </span>
          </div>
        </div>
        <!-- CTA -->
        <div class="px-6 pb-6">
          <button class="w-full bg-primary/10 hover:bg-primary/20 text-primary font-bold py-3 rounded-full text-sm transition-all border border-primary/20 hover:border-primary/40">
            Menüyü Görüntüle →
          </button>
        </div>
      </div>
    `).join('');
  }

  function filterRestaurants(cat) {
    document.querySelectorAll('.filter-btn').forEach(btn => {
      if (btn.dataset.filter === cat) {
        btn.classList.add('bg-primary/10', 'text-primary', 'border-primary');
        btn.classList.remove('text-neutral-400', 'border-white/10');
      } else {
        btn.classList.remove('bg-primary/10', 'text-primary', 'border-primary');
        btn.classList.add('text-neutral-400', 'border-white/10');
      }
    });
    const filtered = cat === 'all' ? restaurants : restaurants.filter(r => r.category === cat);
    renderRestaurants(filtered);
  }

  renderRestaurants(restaurants);
</script>
</body>
</html>
