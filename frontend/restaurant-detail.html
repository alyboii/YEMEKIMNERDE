<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Restoran — YEMEKİMNEREDE</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
    :root {
      --surface:            #0e0e0e;
      --surface-low:        #131313;
      --surface-container:  #1a1919;
      --surface-high:       #201f1f;
      --surface-highest:    #262626;
      --primary:            #ff9153;
      --primary-dark:       #fd761a;
      --primary-dim:        rgba(255,145,83,0.14);
      --on-surface:         #ffffff;
      --on-surface-variant: #adaaaa;
      --on-primary:         #1a0a00;
      --grad:               linear-gradient(135deg,#ff9153 0%,#fd761a 100%);
    }
    body { font-family:'Inter',sans-serif; background:var(--surface); color:var(--on-surface); min-height:100vh; }

    /* NAV */
    nav {
      position:fixed; top:0; left:0; right:0; z-index:100;
      padding:18px 48px; display:flex; align-items:center; justify-content:space-between;
      background:rgba(38,38,38,0.55); backdrop-filter:blur(24px); transition:background .3s;
    }
    nav.scrolled { background:rgba(20,20,20,0.92); }
    .nav-logo { font-size:1.2rem; font-weight:800; letter-spacing:-.02em; color:var(--on-surface); text-decoration:none; }
    .nav-logo span { color:var(--primary); }
    .nav-back {
      display:flex; align-items:center; gap:8px;
      font-size:.875rem; font-weight:500; color:var(--on-surface-variant);
      background:none; border:none; cursor:pointer; transition:color .2s;
    }
    .nav-back:hover { color:var(--on-surface); }
    .nav-actions { display:flex; gap:12px; }
    .nav-icon { width:40px; height:40px; border-radius:50%; background:var(--surface-highest); border:none; cursor:pointer; font-size:1rem; transition:background .2s; }
    .nav-icon:hover { background:var(--surface-high); }

    /* HERO BANNER */
    .hero-banner {
      position:relative; height:420px; overflow:hidden; margin-top:0;
    }
    .hero-banner img { width:100%; height:100%; object-fit:cover; display:block; }
    .hero-banner-placeholder { width:100%; height:100%; background:var(--surface-low); display:flex; align-items:center; justify-content:center; font-size:6rem; }
    .hero-banner::after {
      content:''; position:absolute; inset:0;
      background:linear-gradient(to top, var(--surface) 0%, rgba(14,14,14,.5) 50%, transparent 100%);
    }
    .hero-overlay {
      position:absolute; bottom:0; left:0; right:0; z-index:2;
      padding:48px;
    }
    .hero-badge {
      display:inline-block; padding:5px 14px; border-radius:99px;
      background:rgba(38,38,38,0.75); backdrop-filter:blur(12px);
      font-size:.75rem; font-weight:700; letter-spacing:.04em; text-transform:uppercase;
      color:var(--on-surface); margin-bottom:14px;
    }
    .hero-title { font-size:2.5rem; font-weight:800; letter-spacing:-.03em; margin-bottom:8px; }
    .hero-meta { display:flex; align-items:center; gap:20px; flex-wrap:wrap; }
    .hero-meta-item { font-size:.8125rem; color:var(--on-surface-variant); display:flex; align-items:center; gap:5px; }
    .hero-rating { font-size:.875rem; font-weight:700; color:var(--primary); }

    /* DETAY BÖLÜMÜ */
    .detail-section { padding:48px; background:var(--surface); }

    /* ÇALIŞMA SAATLERİ */
    .hours-grid {
      display:grid; grid-template-columns:repeat(auto-fill,minmax(180px,1fr)); gap:8px;
      padding:24px; background:var(--surface-low); border-radius:1.5rem; margin-bottom:48px;
    }
    .hours-item { font-size:.8125rem; color:var(--on-surface-variant); }
    .hours-item strong { color:var(--on-surface); }

    /* MENÜ BAŞLIĞI */
    .menu-header {
      display:flex; align-items:center; justify-content:space-between;
      margin-bottom:32px; flex-wrap:wrap; gap:16px;
    }
    .menu-title { font-size:1.75rem; font-weight:700; letter-spacing:-.02em; }
    .menu-count { font-size:.75rem; font-weight:700; letter-spacing:.05em; text-transform:uppercase; color:var(--primary); }

    /* KATEGORİ FİLTRELER */
    .cat-filters { display:flex; gap:10px; flex-wrap:wrap; margin-bottom:36px; }
    .cat-chip {
      padding:7px 18px; border-radius:99px; background:var(--surface-high); border:none;
      color:var(--on-surface-variant); font-family:'Inter',sans-serif; font-size:.8125rem;
      font-weight:500; cursor:pointer; transition:all .2s;
    }
    .cat-chip:hover { color:var(--on-surface); }
    .cat-chip.active { background:var(--grad); color:var(--on-primary); font-weight:700; }

    /* MENÜ GRID */
    .menu-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:20px; }

    /* MENÜ KARTI */
    .menu-card {
      background:var(--surface-container); border-radius:1.5rem; overflow:visible;
      position:relative; transition:transform .3s, box-shadow .3s;
    }
    .menu-card:hover { transform:translateY(-4px); box-shadow:0 20px 40px rgba(0,0,0,.4); }

    .menu-card-img { position:relative; height:160px; border-radius:1.5rem 1.5rem 0 0; overflow:hidden; }
    .menu-card-img img { width:100%; height:100%; object-fit:cover; transition:transform .4s; display:block; }
    .menu-card:hover .menu-card-img img { transform:scale(1.06); }
    .menu-card-img-placeholder { width:100%; height:100%; background:var(--surface-high); display:flex; align-items:center; justify-content:center; font-size:2.5rem; }

    /* Quick-add orbital button */
    .orbit-btn {
      position:absolute; bottom:-16px; right:16px; z-index:10;
      width:40px; height:40px; border-radius:50%;
      background:rgba(38,38,38,0.72); backdrop-filter:blur(12px);
      border:none; cursor:pointer; font-size:1.2rem;
      display:flex; align-items:center; justify-content:center;
      transition:background .2s, transform .2s;
      box-shadow:0 4px 16px rgba(0,0,0,.4);
    }
    .orbit-btn:hover { background:var(--grad); transform:scale(1.1); }

    .menu-card-body { padding:24px 20px 20px; }
    .menu-tags { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:10px; }
    .menu-tag {
      padding:3px 10px; border-radius:99px;
      font-size:.6875rem; font-weight:700; letter-spacing:.03em; text-transform:uppercase;
    }
    .tag-vegan     { background:#14532d33; color:#4ade80; }
    .tag-acili     { background:#7f1d1d33; color:#fca5a5; }
    .tag-tatli     { background:#58186033; color:#e879f9; }
    .tag-saglikli  { background:#16485f33; color:#67e8f9; }
    .tag-vejetaryen{ background:#365314a0; color:#a3e635; }
    .tag-default   { background:var(--surface-highest); color:var(--on-surface-variant); }

    .menu-item-name { font-size:1rem; font-weight:600; letter-spacing:-.01em; margin-bottom:4px; }
    .menu-item-desc { font-size:.8125rem; color:var(--on-surface-variant); margin-bottom:14px; line-height:1.5; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
    .menu-item-foot { display:flex; align-items:center; justify-content:space-between; }
    .menu-item-price { font-size:1.125rem; font-weight:800; letter-spacing:-.01em; color:var(--primary); }
    .add-btn {
      padding:8px 20px; border-radius:99px; background:var(--grad); border:none;
      color:var(--on-primary); font-family:'Inter',sans-serif; font-size:.75rem;
      font-weight:700; cursor:pointer; transition:box-shadow .2s, transform .2s;
    }
    .add-btn:hover { box-shadow:0 0 18px rgba(255,145,83,.35); transform:scale(1.04); }

    /* DURUM */
    .state { text-align:center; padding:80px 0; color:var(--on-surface-variant); }
    .state .ico { font-size:3rem; margin-bottom:16px; }

    /* TOAST */
    .toast {
      position:fixed; bottom:28px; right:28px; z-index:200;
      padding:16px 24px; border-radius:1.5rem;
      background:var(--surface-high); backdrop-filter:blur(20px);
      box-shadow:0 20px 40px rgba(0,0,0,.5);
      display:flex; align-items:center; gap:12px;
      transition:opacity .4s, transform .4s;
      min-width:280px;
    }
    .toast.hidden { opacity:0; transform:translateY(12px); pointer-events:none; }
    .toast-icon { font-size:1.25rem; }
    .toast-title { font-size:.9375rem; font-weight:600; color:var(--on-surface); }
    .toast-sub { font-size:.8125rem; color:var(--on-surface-variant); margin-top:2px; }

    @keyframes fadeUp { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }
    .menu-card { animation:fadeUp .4s ease both; }
  </style>
</head>
<body>

<!-- NAV -->
<nav id="nav">
  <a class="nav-logo" href="index.html">YEMEKİM<span>NEREDE</span></a>
  <button class="nav-back" onclick="history.back()">← Geri Dön</button>
  <div class="nav-actions">
    <button class="nav-icon" onclick="location.href='cart.html'">🛒</button>
    <button class="nav-icon" onclick="location.href='profile.html'">👤</button>
  </div>
</nav>

<!-- HERO BANNER -->
<div class="hero-banner" id="heroBanner">
  <div class="hero-banner-placeholder">🍽️</div>
</div>

<!-- HERO OVERLAY (JS ile doldurulur) -->
<div class="detail-section">
  <div id="heroOverlay" style="margin-bottom:32px;"></div>
  <div id="hoursBlock"></div>

  <!-- MENÜ -->
  <div id="menuSection" style="display:none;">
    <div class="menu-header">
      <h2 class="menu-title">Menü</h2>
      <span class="menu-count" id="menuCount"></span>
    </div>
    <div class="cat-filters" id="catFilters"></div>
    <div id="menuLoading" class="state"><div class="ico">🍴</div><p>Yükleniyor...</p></div>
    <div id="menuGrid" class="menu-grid"></div>
    <div id="menuEmpty" class="state" style="display:none"><div class="ico">🫙</div><p>Bu restorana henüz menü eklenmemiş.</p></div>
  </div>

  <div id="pageLoading" class="state"><div class="ico">🍽️</div><p>Yükleniyor...</p></div>
  <div id="pageError" class="state" style="display:none"><div class="ico">⚠️</div><p>Restoran yüklenemedi.</p></div>
</div>

<!-- TOAST -->
<div id="toast" class="toast hidden">
  <span class="toast-icon" id="toastIcon">✅</span>
  <div>
    <p class="toast-title" id="toastTitle"></p>
    <p class="toast-sub" id="toastSub"></p>
  </div>
</div>

<script>
  const API = 'https://api.yemekimnerede.com/v1';
  const token = localStorage.getItem('token');
  const params = new URLSearchParams(location.search);
  const restoranId = params.get('id');
  if (!restoranId) location.href = 'restaurants.html';

  let allMenu = [];
  let activeCategory = '';

  window.addEventListener('scroll', () =>
    document.getElementById('nav').classList.toggle('scrolled', scrollY > 40));

  async function load() {
    try {
      const res = await fetch(`${API}/restaurants/${restoranId}`);
      if (!res.ok) throw new Error();
      const { restoran, menu } = await res.json();
      allMenu = menu || [];

      document.title = `${restoran.ad} — YEMEKİMNEREDE`;
      renderHero(restoran);
      renderHours(restoran.calismaSaatleri);
      document.getElementById('pageLoading').style.display = 'none';
      document.getElementById('menuSection').style.display = 'block';
      buildCategories(allMenu);
      renderMenu(allMenu);
    } catch {
      document.getElementById('pageLoading').style.display = 'none';
      document.getElementById('pageError').style.display = 'block';
    }
  }

  function renderHero(r) {
    // Banner görseli
    if (r.gorselUrl) {
      document.getElementById('heroBanner').innerHTML =
        `<img src="${r.gorselUrl}" alt="${r.ad}" />` +
        `<div style="position:absolute;inset:0;background:linear-gradient(to top,var(--surface) 0%,rgba(14,14,14,.4) 55%,transparent 100%);"></div>`;
    }

    document.getElementById('heroOverlay').innerHTML = `
      <span class="hero-badge">${r.mutfakTuru}</span>
      <h1 class="hero-title">${r.ad}</h1>
      <div class="hero-meta">
        <span class="hero-meta-item">📍 ${r.konum?.adres || ''}, ${r.konum?.sehir || ''}</span>
        <span class="hero-rating">⭐ ${(r.puan||0).toFixed(1)}</span>
      </div>`;
  }

  function renderHours(saatler) {
    if (!saatler || !saatler.length) return;
    const block = document.getElementById('hoursBlock');
    block.innerHTML = `
      <p style="font-size:.75rem;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--on-surface-variant);margin-bottom:12px;">Çalışma Saatleri</p>
      <div class="hours-grid">
        ${saatler.map(s => `<div class="hours-item"><strong>${s.gun}</strong> · ${s.acilis} – ${s.kapanis}</div>`).join('')}
      </div>`;
  }

  function buildCategories(menu) {
    const cats = ['Tümü', ...new Set(menu.map(m => m.kategori).filter(Boolean))];
    const wrap = document.getElementById('catFilters');
    wrap.innerHTML = '';
    cats.forEach((c, i) => {
      const btn = document.createElement('button');
      btn.className = 'cat-chip' + (i === 0 ? ' active' : '');
      btn.textContent = c;
      btn.onclick = () => {
        document.querySelectorAll('.cat-chip').forEach(x => x.classList.remove('active'));
        btn.classList.add('active');
        activeCategory = c === 'Tümü' ? '' : c;
        renderMenu(allMenu);
      };
      wrap.appendChild(btn);
    });
  }

  function renderMenu(list) {
    document.getElementById('menuLoading').style.display = 'none';
    const grid = document.getElementById('menuGrid');
    const empty = document.getElementById('menuEmpty');
    grid.innerHTML = '';

    const filtered = activeCategory ? list.filter(m => m.kategori === activeCategory) : list;
    document.getElementById('menuCount').textContent = `${filtered.length} Ürün`;

    if (!filtered.length) { empty.style.display = 'block'; return; }
    empty.style.display = 'none';

    filtered.forEach((item, i) => {
      const img = item.gorselUrl
        ? `<img src="${item.gorselUrl}" alt="${item.ad}" loading="lazy" />`
        : `<div class="menu-card-img-placeholder">🍴</div>`;

      const tags = (item.etiketler || []).map(e => {
        const cls = {vegan:'tag-vegan',acılı:'tag-acili',tatlı:'tag-tatli',sağlıklı:'tag-saglikli',vejeteryan:'tag-vejetaryen'}[e.toLowerCase()] || 'tag-default';
        return `<span class="menu-tag ${cls}">${e}</span>`;
      }).join('');

      const card = document.createElement('div');
      card.className = 'menu-card';
      card.style.animationDelay = `${i * 50}ms`;
      card.innerHTML = `
        <div class="menu-card-img">
          ${img}
          <button class="orbit-btn" onclick="sepeteEkle('${item._id}','${item.ad}',${item.fiyat},event)">+</button>
        </div>
        <div class="menu-card-body">
          ${tags ? `<div class="menu-tags">${tags}</div>` : ''}
          <h3 class="menu-item-name">${item.ad}</h3>
          ${item.aciklama ? `<p class="menu-item-desc">${item.aciklama}</p>` : ''}
          <div class="menu-item-foot">
            <span class="menu-item-price">${item.fiyat}₺</span>
            <button class="add-btn" onclick="sepeteEkle('${item._id}','${item.ad}',${item.fiyat},event)">+ Sepete Ekle</button>
          </div>
        </div>`;
      grid.appendChild(card);
    });
  }

  async function sepeteEkle(id, ad, fiyat, e) {
    e.stopPropagation();
    if (!token) { location.href = 'login.html'; return; }
    try {
      const res = await fetch(`${API}/cart/items`, {
        method: 'POST',
        headers: { 'Content-Type':'application/json', Authorization:`Bearer ${token}` },
        body: JSON.stringify({ menuItemId: id, miktar: 1 }),
      });
      toast(res.ok ? '✅' : '❌', res.ok ? `${ad} sepete eklendi` : 'Eklenemedi', res.ok ? 'Inventory changes saved automatically.' : '');
    } catch { toast('❌','Bir hata oluştu',''); }
  }

  function toast(icon, title, sub) {
    document.getElementById('toastIcon').textContent = icon;
    document.getElementById('toastTitle').textContent = title;
    document.getElementById('toastSub').textContent = sub;
    const el = document.getElementById('toast');
    el.classList.remove('hidden');
    setTimeout(() => el.classList.add('hidden'), 3500);
  }

  load();
</script>
</body>
</html>
