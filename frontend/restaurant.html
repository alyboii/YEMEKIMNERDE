  // ---- CART ----
  let cart = JSON.parse(localStorage.getItem('cart') || '[]');
  let currentRestaurant = null;

  function saveCart() {
    localStorage.setItem('cart', JSON.stringify(cart));
  }

  function addToCart(restaurantId, item) {
    const existing = cart.find(c => c.id === item.id);
    if (existing) {
      existing.qty += 1;
    } else {
      cart.push({ ...item, qty: 1, restaurantId });
    }
    // Teslimat ücretini sepet sayfasının okuyabilmesi için kaydet
    if (currentRestaurant) {
      localStorage.setItem('cartDeliveryFee', currentRestaurant.deliveryFee);
      localStorage.setItem('cartRestaurantName', currentRestaurant.name);
    }
    saveCart();
    renderCartSidebar();
    showToast();
  }

  function removeFromCart(itemId) {
    const idx = cart.findIndex(c => c.id === itemId);
    if (idx > -1) {
      if (cart[idx].qty > 1) cart[idx].qty -= 1;
      else cart.splice(idx, 1);
    }
    saveCart();
    renderCartSidebar();
  }

  function showToast() {
    const t = document.getElementById('toast');
    t.style.opacity = '1';
    t.style.transform = 'translateY(0) translateX(-50%)';
    setTimeout(() => {
      t.style.opacity = '0';
      t.style.transform = 'translateY(16px) translateX(-50%)';
    }, 1800);
  }

  function renderCartSidebar() {
    const list = document.getElementById('cart-items-list');
    const summary = document.getElementById('cart-summary');
    const checkoutBtn = document.getElementById('checkout-btn');
    const badge = document.getElementById('cart-badge');
    const warning = document.getElementById('min-order-warning');
    const mobileBar = document.getElementById('mobile-cart-bar');

    const totalQty = cart.reduce((s, c) => s + c.qty, 0);
    const subtotal = cart.reduce((s, c) => s + c.price * c.qty, 0);
    const fee = currentRestaurant ? currentRestaurant.deliveryFee : 0;

    badge.textContent = totalQty;
    badge.classList.toggle('hidden', totalQty === 0);

    if (cart.length === 0) {
      list.innerHTML = '<p class="text-neutral-500 text-sm text-center py-4">Sepetiniz boş</p>';
      summary.classList.add('hidden');
      checkoutBtn.classList.add('hidden');
      warning.classList.add('hidden');
      mobileBar.classList.add('hidden');
    } else {
      list.innerHTML = cart.map(c => `
        <div class="flex items-center justify-between gap-2">
          <div class="flex-1 min-w-0">
            <div class="text-sm font-medium text-white truncate">${c.name}</div>
            <div class="text-xs text-neutral-500">₺${c.price} × ${c.qty}</div>
          </div>
          <div class="flex items-center gap-2">
            <button onclick="removeFromCart('${c.id}')" class="w-6 h-6 rounded-full bg-white/10 hover:bg-white/20 text-white text-sm flex items-center justify-center transition-all">−</button>
            <span class="text-sm font-bold w-4 text-center">${c.qty}</span>
            <button onclick="addToCart(${currentRestaurant.id}, {id:'${c.id}',name:'${c.name}',price:${c.price},image:'${c.image || ''}'})" class="w-6 h-6 rounded-full bg-primary/20 hover:bg-primary/40 text-primary text-sm flex items-center justify-center transition-all">+</button>
          </div>
        </div>
      `).join('');
      summary.classList.remove('hidden');
      document.getElementById('subtotal').textContent = `₺${subtotal}`;
      document.getElementById('delivery-fee-display').textContent = `₺${fee}`;
      document.getElementById('total').textContent = `₺${subtotal + fee}`;

      const minOrder = currentRestaurant ? currentRestaurant.minOrder : 0;
      if (subtotal >= minOrder) {
        checkoutBtn.classList.remove('hidden');
        warning.classList.add('hidden');
      } else {
        checkoutBtn.classList.add('hidden');
        warning.textContent = `Min. sipariş tutarı ₺${minOrder} (₺${minOrder - subtotal} eksik)`;
        warning.classList.remove('hidden');
      }

      // mobile bar
      mobileBar.classList.remove('hidden');
      document.getElementById('mobile-cart-count').textContent = `${totalQty} ürün`;
      document.getElementById('mobile-cart-total').textContent = `₺${subtotal + fee}`;
    }
  }

  // ---- RENDER ----

    document.title = `${restaurant.name} | YEMEKİMNEREDE`;

    // Header
    document.getElementById('restaurant-header').innerHTML = `

              <div class="w-20 h-20 rounded-xl overflow-hidden flex-shrink-0 bg-surface-container-highest">
                <img src="${item.image}" alt="${item.name}" class="w-full h-full object-cover" loading="lazy" />
              </div>
              <div class="flex-1 min-w-0">
                <div class="flex items-start justify-between gap-2 mb-1">
                  <div>
                    <span class="font-semibold text-white">${item.name}</span>
                    ${item.popular ? '<span class="ml-2 text-[10px] px-2 py-0.5 rounded-full bg-primary/15 text-primary font-bold uppercase">Popüler</span>' : ''}

                </div>

                <div class="flex items-center justify-between">
                  <span class="text-primary font-black text-lg">₺${item.price}</span>
                  <button
                    onclick="addToCart(${restaurant.id}, {id:'${item.id}',name:'${item.name}',price:${item.price},image:'${item.image}'})"
                    class="flex items-center gap-1 bg-primary/10 hover:bg-primary/20 text-primary border border-primary/20 hover:border-primary/40 px-4 py-1.5 rounded-full text-sm font-bold transition-all">
                    <span class="material-symbols-outlined text-sm">add</span>
                    Ekle
                  </button>
                </div>
              </div>
            </div>
          `).join('')}
        </div>
      </div>
    `).join('');
  }

  function scrollToCategory(id) {
    const el = document.getElementById(id);
    if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  // ---- REST API ENTEGRASYONU ----
  // Restoran detayı ve menüsü gerçek ortamda bu endpoint'ten çekilir.
  // Sunucu erişilemez ise yerel veri (fallback) kullanılır.
  const API_BASE = 'https://yemekimnerde.vercel.app/v1';

  // ---- INIT ----
  const params = new URLSearchParams(window.location.search);
  const id = parseInt(params.get('id'));

  async function loadRestaurantFromAPI(restaurantId) {
    const token = localStorage.getItem('token');
    try {
      const res = await fetch(`${API_BASE}/restaurants/${restaurantId}`, {
        headers: {
          'Content-Type': 'application/json',
          ...(token && { 'Authorization': `Bearer ${token}` })
        }
      });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();
      // API yanıtı varsa kullan; yoksa yerel veriye düş
      if (data && data.name) {
        currentRestaurant = data;
        renderPage(currentRestaurant);
        renderCartSidebar();
        return;
      }
      throw new Error('Geçersiz yanıt');
    } catch (err) {
      // API erişilemez veya hata — yerel statik veri kullanılır
      console.warn('[YemekimNerede] API bağlantısı kurulamadı, yerel veri kullanılıyor:', err.message);
      currentRestaurant = restaurantData[restaurantId];
      if (!currentRestaurant) {
        document.getElementById('restaurant-header').innerHTML = `
          <div class="text-center py-20">
            <div class="text-6xl mb-4">😕</div>
            <h2 class="text-2xl font-bold mb-2">Restoran bulunamadı</h2>
            <a href="restaurants.html" class="text-primary hover:underline">Restoranlara dön</a>
          </div>`;
        document.getElementById('menu-container').innerHTML = '';
        document.getElementById('category-tabs').innerHTML = '';
      } else {
        renderPage(currentRestaurant);
        renderCartSidebar();
      }
    }
  }

  // API'den restoran verisini çek (fallback: yerel veri)
  loadRestaurantFromAPI(id);
</script>
